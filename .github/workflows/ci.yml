name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install (runs workspace prepare scripts, builds SDK dist)
        run: npm install
      - name: Build all workspaces
        run: npm run build
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Pack check (all five published packages)
        run: |
          npm pack --dry-run -w @actuarial-ts/core
          npm pack --dry-run -w @actuarial-ts/interchange
          npm pack --dry-run -w @actuarial-ts/data
          npm pack --dry-run -w @actuarial-ts/compliance
          npm pack --dry-run -w @actuarial-ts/agents
