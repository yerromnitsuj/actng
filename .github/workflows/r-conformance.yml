name: R interop conformance

# The third shore. The TS runner is in `CI`, the Python runner in
# `py-conformance.yml`; without this job the README's "three shores" claim
# rested on manual runs. ChainLadder + jsonlite come from CRAN with a cache,
# since compiling ChainLadder's dependency tree cold takes several minutes.
on:
  push:
    branches: [main]
    paths:
      - "tools/interop/**"
      - "interop/conformance/fixtures/**"
      - ".github/workflows/r-conformance.yml"
      - "examples/chain-ladder-r/**"
      - "examples/chain-ladder-crosscheck/**"
      - "packages/**"
      - "package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - "tools/interop/**"
      - "interop/conformance/fixtures/**"
      - "examples/chain-ladder-r/**"
      - "examples/chain-ladder-crosscheck/**"
      - "packages/**"
      - "package-lock.json"

jobs:
  r-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true # binary packages; cold install in seconds, not minutes
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-libs-${{ runner.os }}-chainladder-jsonlite-v1
      - name: Install ChainLadder + jsonlite
        run: |
          Rscript -e 'installed <- rownames(installed.packages());
            need <- setdiff(c("ChainLadder", "jsonlite"), installed);
            if (length(need) > 0) install.packages(need, repos = "https://packagemanager.posit.co/cran/__linux__/jammy/latest")'
      - name: JCS serializer self-test (committed vectors)
        run: Rscript -e 'source("tools/interop/actuarialInterchange.R"); ats_test_jcs()'
      - name: Cross-engine conformance (frozen corpus, mack1993-vw profile)
        run: Rscript tools/interop/conformance.R
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: npm ci (workspace + SDK build via prepare)
        run: npm ci
      - name: run-mack.R CLI smoke (literature anchor)
        run: |
          Rscript tools/interop/run-mack.R \
            --in interop/conformance/fixtures/taylor-ashe/triangle.json \
            --selection interop/conformance/fixtures/taylor-ashe/selection.json \
            --out /tmp/r-result.json --created-at 2026-07-19T00:00:00Z
          Rscript -e 'source("tools/interop/actuarialInterchange.R");
            doc <- ats_read_document("/tmp/r-result.json");
            stopifnot(abs(doc$result$totals$unpaid - 18680856) <= 1)'
      - name: Chain-ladder R example (live Rscript)
        run: npm test -w @actuarial-ts/example-chain-ladder-r

  # The capstone (Task 6): boots BOTH the sidecar and Rscript, then computes
  # the Taylor & Ashe result with all three engines live and referees them
  # pairwise. Sidecar-boot block mirrors py-conformance.yml's crosscheck-ci
  # job (pip upgrade first, fail-loud health poll) rather than drifting.
  examples-capstone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-libs-${{ runner.os }}-chainladder-jsonlite-v1
      - name: Install ChainLadder + jsonlite
        run: |
          Rscript -e 'installed <- rownames(installed.packages());
            need <- setdiff(c("ChainLadder", "jsonlite"), installed);
            if (length(need) > 0) install.packages(need, repos = "https://packagemanager.posit.co/cran/__linux__/jammy/latest")'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Provision + boot the sidecar
        run: |
          python3 -m venv .venv-interop
          .venv-interop/bin/python -m pip install --upgrade pip
          .venv-interop/bin/pip install -e interop/python -r interop/sidecar/requirements.txt
          PYTHONPATH=interop SIDECAR_TOKEN=ci-secret nohup .venv-interop/bin/python -m sidecar > sidecar.log 2>&1 &
          echo $! > sidecar.pid
      - name: Wait for /v1/health
        run: |
          for i in $(seq 1 60); do
            if curl -sf "http://127.0.0.1:8091/v1/health" > /dev/null; then exit 0; fi
            sleep 1
          done
          echo "sidecar never became healthy" >&2
          cat sidecar.log >&2
          exit 1
      - name: Capstone — three engines, one referee
        run: npm test -w @actuarial-ts/example-chain-ladder-crosscheck
        env:
          SIDECAR_URL: http://127.0.0.1:8091
          SIDECAR_TOKEN: ci-secret
      - name: Sidecar log on failure
        if: failure()
        run: cat sidecar.log || true
      - name: Teardown
        if: always()
        run: kill "$(cat sidecar.pid)" 2>/dev/null || true
